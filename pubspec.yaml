name: lol_esport_tracker
description: "League of Legends esport follow-up app — live scores, rosters, favorites."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  google_fonts: ^6.2.1
  provider: ^6.1.2
  sqflite: ^2.4.1
  path: ^1.9.0
  crypto: ^3.0.3
  shared_preferences: ^2.3.3
  flutter_local_notifications: ^22.0.1
  workmanager: ^0.9.0+3
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.4

flutter:
  uses-material-design: true
